<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Model Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/OrbitControls.js';
import { RGBELoader } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/loaders/RGBELoader.js';

/* ---------- SCENE ---------- */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

/* ---------- CONTROLS ---------- */
const controls = new OrbitControls(camera, renderer.domElement);
camera.position.set(0, -25, 15);

/* ---------- HDR ---------- */
new RGBELoader().load('models/goegap_road_2k.hdr', hdr => {
  hdr.mapping = THREE.EquirectangularReflectionMapping;
  scene.environment = hdr;
  scene.background = hdr;
});

/* ---------- LIGHT ---------- */
scene.add(new THREE.AmbientLight(0xffffff, 1));

/* ---------- LOAD GLB ---------- */
const loader = new GLTFLoader();
const textureLoader = new THREE.TextureLoader();

const materials = [];
let selectedMaterial = null;

loader.load('models/porsche.glb', (gltf) => {
  const model = gltf.scene;
  model.scale.set(2,2,2);
  scene.add(model);

  model.traverse(obj => {
    if (obj.isMesh && obj.material) {

      // AO map needs uv2
      if (obj.geometry.attributes.uv && !obj.geometry.attributes.uv2) {
        obj.geometry.setAttribute('uv2', obj.geometry.attributes.uv);
      }

      if (Array.isArray(obj.material)) {
        obj.material.forEach(m => materials.push(m));
      } else {
        materials.push(obj.material);
      }
    }
  });

  initMaterialGUI();
});

/* ---------- GUI ---------- */
const gui = new dat.GUI();
const materialFolder = gui.addFolder('GLB Materials');

const matUI = {
  material: '',
  color: '#ffffff',
  metalness: 0,
  roughness: 1,
  envMapIntensity: 1,
  transparent: false,
  opacity: 1
};

function initMaterialGUI() {
  const names = materials.map(
    (m, i) => m.name || `Material_${i}`
  );

  matUI.material = names[0];
  selectedMaterial = materials[0];
  syncUI();

  materialFolder.add(matUI, 'material', names)
    .name(`Materials (${materials.length})`)
    .onChange((name) => {
      const index = names.indexOf(name);
      selectedMaterial = materials[index];
      syncUI();
    });

  materialFolder.addColor(matUI, 'color').onChange(v => {
    selectedMaterial.color.set(v);
  });

  materialFolder.add(matUI, 'metalness', 0, 1).onChange(v => {
    selectedMaterial.metalness = v;
  });

  materialFolder.add(matUI, 'roughness', 0, 1).onChange(v => {
    selectedMaterial.roughness = v;
  });

  materialFolder.add(matUI, 'envMapIntensity', 0, 5).onChange(v => {
    selectedMaterial.envMapIntensity = v;
  });

  materialFolder.add(matUI, 'transparent').onChange(v => {
    selectedMaterial.transparent = v;
    selectedMaterial.needsUpdate = true;
  });

  materialFolder.add(matUI, 'opacity', 0, 1).onChange(v => {
    selectedMaterial.opacity = v;
  });

  addMapLoader('AO Map', 'aoMap');
  addMapLoader('Roughness Map', 'roughnessMap');
  addMapLoader('Metalness Map', 'metalnessMap');
  addMapLoader('Normal Map', 'normalMap');
  addMapLoader('Emissive Map', 'emissiveMap');
  addMapLoader('Reflection Map', 'envMap');

  materialFolder.open();
}

function syncUI() {
  matUI.color = `#${selectedMaterial.color.getHexString()}`;
  matUI.metalness = selectedMaterial.metalness ?? 0;
  matUI.roughness = selectedMaterial.roughness ?? 1;
  matUI.envMapIntensity = selectedMaterial.envMapIntensity ?? 1;
  matUI.transparent = selectedMaterial.transparent;
  matUI.opacity = selectedMaterial.opacity;
}

function addMapLoader(label, type) {
  materialFolder.add({ load: () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';

    input.onchange = e => {
      const file = e.target.files[0];
      const url = URL.createObjectURL(file);

      textureLoader.load(url, tex => {
        tex.flipY = false;
        selectedMaterial[type] = tex;
        selectedMaterial.needsUpdate = true;
      });
    };
    input.click();
  }}, 'load').name(label);
}

/* ---------- ANIMATE ---------- */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ---------- RESIZE ---------- */
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</head>

<body style="margin:0; overflow:hidden;"></body>
</html>
