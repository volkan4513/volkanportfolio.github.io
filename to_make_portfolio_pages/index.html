<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layer Stack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stack-wrapper {
            position: relative;
            width: 100vw;
            aspect-ratio: 1;
            cursor: crosshair;
        }

        .layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
            filter: none;
        }

        /* --- popup modal --- */
        #popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        #popup-overlay.open { display: flex; }

        #popup-inner {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }

        #popup-img {
            display: block;
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 4px;
        }

        #popup-close {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #fff;
            color: #111;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        #popup-close:hover { background: #ddd; }
    </style>
</head>
<body>

    <div class="stack-wrapper" id="wrapper"></div>

    <!-- random popup modal -->
    <div id="popup-overlay">
        <div id="popup-inner">
            <button id="popup-close">✕</button>
            <img id="popup-img" src="" alt="">
        </div>
    </div>

    <script>
        const wrapper      = document.getElementById('wrapper');
        const popupOverlay = document.getElementById('popup-overlay');
        const popupImg     = document.getElementById('popup-img');

        const W = wrapper.offsetWidth;
        const H = wrapper.offsetHeight;

        // --- popup helpers ---
        let cachedPopupImages = null;

        async function getPopupImages() {
            if (cachedPopupImages) return cachedPopupImages;
            const res  = await fetch('popup_random_images/');
            const html = await res.text();
            const doc  = new DOMParser().parseFromString(html, 'text/html');
            cachedPopupImages = [...doc.querySelectorAll('a[href]')]
                .map(a => a.getAttribute('href'))
                .filter(href => /\.(png|jpg|jpeg|webp|gif)$/i.test(href));
            return cachedPopupImages;
        }

        async function showRandomPopup() {
            const imgs = await getPopupImages();
            if (!imgs.length) return;
            const pick = imgs[Math.floor(Math.random() * imgs.length)];
            popupImg.src = 'popup_random_images/' + pick;
            popupOverlay.classList.add('open');
        }

        function closePopup() {
            popupOverlay.classList.remove('open');
            popupImg.src = '';
        }

        document.getElementById('popup-close').addEventListener('click', closePopup);
        popupOverlay.addEventListener('click', e => { if (e.target === popupOverlay) closePopup(); });

        // --- image layer helpers ---
        async function listImages(dir) {
            const res  = await fetch(dir);
            const html = await res.text();
            const doc  = new DOMParser().parseFromString(html, 'text/html');
            return [...doc.querySelectorAll('a[href]')]
                .map(a => a.getAttribute('href'))
                .filter(href => /\.png$/i.test(href))
                .sort((a, b) => {
                    const rank = n => {
                        const l = n.toLowerCase();
                        if (l.startsWith('base'))  return 0;
                        if (l.includes('front'))   return 2;
                        return 1;
                    };
                    const diff = rank(a) - rank(b);
                    return diff !== 0 ? diff : a.localeCompare(b);
                });
        }

        function paintContained(ctx, img) {
            const scale = Math.min(W / img.naturalWidth, H / img.naturalHeight);
            const w = img.naturalWidth  * scale;
            const h = img.naturalHeight * scale;
            ctx.clearRect(0, 0, W, H);
            ctx.drawImage(img, (W - w) / 2, (H - h) / 2, w, h);
        }

        function alpha(ctx, x, y) {
            try { return ctx.getImageData(Math.round(x), Math.round(y), 1, 1).data[3]; }
            catch { return 0; }
        }

        function imgName(el) {
            return el.getAttribute('src').split('/').pop().replace(/\.[^.]+$/, '');
        }

        async function init() {
            const [filenames, config] = await Promise.all([
                listImages('images_to_use/'),
                fetch('functions_to_work.json').then(r => r.json()),
            ]);

            const namesToLink     = config[0]?.names_to_link     ?? {};
            const openRandomPopup = config[0]?.open_random_popup ?? {};
            const scrollDown      = config[0]?.scroll_down       ?? {};

            filenames.forEach(filename => {
                const img = document.createElement('img');
                img.className = 'layer';
                img.src       = 'images_to_use/' + filename;
                img.alt       = decodeURIComponent(filename).replace(/\.[^.]+$/, '');
                wrapper.appendChild(img);
            });

            const noHighlight = name => name.startsWith('base') || name.includes('text');

            const hitLayers = [...wrapper.querySelectorAll('.layer')]
                .filter(el => !noHighlight(imgName(el).toLowerCase()))
                .reverse();

            const entries = hitLayers.map(el => {
                const canvas = document.createElement('canvas');
                canvas.width = W; canvas.height = H;
                return {
                    el,
                    ctx: canvas.getContext('2d', { willReadFrequently: true }),
                    ready: false,
                };
            });

            await Promise.all(entries.map(entry => new Promise(resolve => {
                const img   = entry.el;
                const paint = () => { paintContained(entry.ctx, img); entry.ready = true; resolve(); };
                img.complete && img.naturalWidth ? paint() : img.addEventListener('load', paint);
            })));

            function hitAt(mx, my) {
                for (const e of entries)
                    if (e.ready && alpha(e.ctx, mx, my) > 8) return e.el;
                return null;
            }

            const OUTLINE_WIDTH = 1; // px — change to adjust highlight border thickness
            const d = OUTLINE_WIDTH, hh = Math.round(d / 2);
            const OUTLINE =
                `drop-shadow(${d}px 0 0 white) drop-shadow(-${d}px 0 0 white) ` +
                `drop-shadow(0 ${d}px 0 white) drop-shadow(0 -${d}px 0 white) ` +
                `drop-shadow(${hh}px ${hh}px 0 white) drop-shadow(-${hh}px -${hh}px 0 white) ` +
                `drop-shadow(${hh}px -${hh}px 0 white) drop-shadow(-${hh}px ${hh}px 0 white)`;

            let active = null;

            wrapper.addEventListener('mousemove', e => {
                const r   = wrapper.getBoundingClientRect();
                const hit = hitAt(e.clientX - r.left, e.clientY - r.top);
                if (hit !== active) {
                    if (active) active.style.filter = 'none';
                    if (hit)    hit.style.filter    = OUTLINE;
                    active = hit;
                }
            });

            wrapper.addEventListener('click', e => {
                const r    = wrapper.getBoundingClientRect();
                const hit  = hitAt(e.clientX - r.left, e.clientY - r.top);
                if (!hit) return;
                const name = imgName(hit);
                console.log(name);

                if (namesToLink[name]) {
                    window.location.href = namesToLink[name];
                } else if (name in openRandomPopup) {
                    showRandomPopup();
                } else if (name in scrollDown) {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }
            });

            wrapper.addEventListener('mouseleave', () => {
                if (active) { active.style.filter = 'none'; active = null; }
            });
        }

        init().catch(err => console.error('Failed to load images:', err));
    </script>

</body>
</html>
